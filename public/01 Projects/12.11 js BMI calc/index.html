<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
    </style>
    <script>
        function bmiCalculator(weight,height) {
            return weight / (height * height);
        }

        document.addEventListener('DOMContentLoaded', (event) => {
            const button = document.querySelector('button');

            button.addEventListener('click', () => {
                //written code here
                var weight = prompt("Enter your weight in kg: ");
                var height = prompt("Enter your height in meters: ");
                var bmi = bmiCalculator(weight, height);
                alert("Your BMI is: " + Math.floor(bmi));
                alert("Thank you for using our BMI calculator. Stay healthy!")
                //end of written code
            });
        });
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <p>A code that calculates your BMI</p>
    <p>Click the below button to see the result</p>
    <button type="button" class="btn btn-dark">Click me</button>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
